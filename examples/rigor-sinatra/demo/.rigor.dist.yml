paths:
  - demo.rb

plugins:
  - rigor-sinatra

signature_paths:
  # Minimal Sinatra::Base RBS stub local to the demo. Covers the
  # subset the demo touches (`params`, `redirect`, `halt`, plus
  # the class-level HTTP verb methods). A real project depending
  # on `sinatra` would expose its own RBS through bundler
  # auto-discovery (rigor's O4 layer-1/2 path) — the local stub
  # keeps this demo self-contained.
  - sig

cache:
  # Strict per-demo isolation: cache lives under tmp/, which the
  # demo's .gitignore excludes. Keeps demo runs from polluting
  # the repo with cache artefacts and survives the eventual
  # `git subtree split` per the rigor-plugin-author SKILL.
  path: tmp/.rigor/cache
